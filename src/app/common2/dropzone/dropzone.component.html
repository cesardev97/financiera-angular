<ngx-dropzone (change)="onSelect($event)" 
    accept="{{acceptFiles.join()}}" [maxFileSize]="allowedSize" [multiple]="multiple">
    <ngx-dropzone-label>
        <img class="drop-image" src="/assets/images/utils/file.svg">
        <span class="text-image">Suelta tu archivo aquí</span>
        <div class="separator">o</div>
        <span class="btn gnrl">Buscar archivos</span>
    </ngx-dropzone-label>
    <ngx-dropzone-preview *ngFor="let f of files" [removable]="true" 
        (removed)="onRemove(f)">
        <ngx-dropzone-label>{{ f.name }}</ngx-dropzone-label>
    </ngx-dropzone-preview>
</ngx-dropzone>

<span class="field-feedback" *ngIf="isToBig">
    Archivo muy grande (máximo: {{allowedSize / 1000000}} MB)
</span>
