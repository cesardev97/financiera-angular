<app-banner-page [bannerFields]="acf"></app-banner-page>

<breadcrumbs [breadcrumbs]="acf.breadcrumb"></breadcrumbs>

<section class="dividends bg-gray">
    <div class="container">
        <div class="titles center">
            <h2 class="title center">{{acf.title_dividends}}</h2>
            <h5 class="subtitle_2">{{acf.subtitle_dividends}}</h5>
        </div>
    
        <div class="documents-ctn">
            <div class="documents">
                <a *ngFor="let item of acf.documents_dividends"
                        class="document_item" [href]="item.document.url" target="_blank"
                    >
                        <h5 class="document_title">{{item.file_name}}</h5>
                        <div class="type-document" *ngIf="item.document.subtype == 'pdf'">
                            <i class="icon icon-adobe"></i>Adobe PDF
                        </div>
                    </a>
            </div>
        </div>
    </div>
</section>

<section class="info_shareholders">
    <div class="container min">
        <h2 class="title center">{{acf.title_shareholders}}</h2>
        <div class="shareholders_slider">
            <div class="swiper-card swiper-height-auto">
                <swiper [config]="configInfo">
                    <ng-template swiperSlide *ngFor="let item of acf.list_shareholders">
                        <div class="card card-2">
                            <img [src]="item.image" [alt]="item.title">
                            <div class="card-body">
                                <h4 class="card-title">{{item.title}}</h4>
                                <div class="paragraph"><p>{{item.description}}</p></div>
                            </div>
                            <app-link
                                [typeUrl]="item.type_url"
                                [urls]="['',item.link,item.document]"
                                [labelBtn]="item.link_label"
                            ></app-link>
                        </div>
                    </ng-template> 
                </swiper>  
            </div>
            <div class="shareholder-pagination swiper-pagination"></div>
        </div>
    </div>
</section>
