<app-banner-page [bannerFields]="acf"></app-banner-page>

<breadcrumbs [breadcrumbs]="acf.breadcrumb"></breadcrumbs>

<section class="cookies_about">
    <div class="container">
        <h2 class="title center">{{acf.about_title}}</h2>
        <div class="c-flex items-center">
            <div class="img-wrap">
                <img class="cookie-img" [src]="acf.about_img" alt="">
            </div>
            <article>
                <h3 class="title-info">{{acf.about_title2}}</h3>
                <div class="paragrpah" [innerHtml]="acf.about_description"></div>
            </article>
        </div>
    </div>
</section>


<section class="cookies_use bg-gray">
    <div class="container">
        <div class="c-flex r-reverse">
            <div class="img-wrap">
                <img class="decorated-img" [src]="acf.use_image" alt="">
            </div>
            <article>
                <h3 class="title-info">{{acf.use_title}}</h3>
                <div class="paragraph_wrap">
                    <div class="paragraph" [innerHtml]="acf.use_description"></div>
                </div>
            </article>
        </div>
    </div>
</section>

<section class="cookies_deactivate">
    <div class="container">
        <div class="c-flex items-center">
            <div class="img-wrap">
                <img class="cookie-img" [src]="acf.deactivate_img" alt="">
            </div>
            <div>
                <h3 class="title-info">{{acf.deactivate_title}}</h3>
                <div class="paragraph" [innerHtml]="acf.deactivate_info"></div>
            </div>
        </div>
    </div>
</section>

<section class="cookie_block">
    <div class="container max">
        <div class="block_link_wrap b-3 bg-1">
            <app-block-url
                [titleBloq]="acf.faq_title || opt.faq_title"
                [subtitleBlock]="acf.faq_subtitle || opt.faq_subtitle"
                [imageBlock]="acf.faq_image || opt.faq_image"
                [textBtnBlock]="acf.faq_btn_txt || opt.faq_btn_txt"
                [urlBlock]="acf.faq_url || opt.faq_url"    
            >
            </app-block-url>    
        </div>
    </div>
</section>
